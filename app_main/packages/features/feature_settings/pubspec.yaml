name: feature_settings
description: Manages app settings (profile, security, currencies) and UI.
publish_to: 'none'

environment:
  sdk: ^3.9.2

dependencies:
  supabase_flutter: ^2.5.4
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  drift: ^2.29.0
  local_auth: ^2.3.0
  url_launcher: ^6.3.2
  share_plus: ^10.0.0
  image_picker: ^1.1.2 # Required for ImageSource enum
  
  # Local Dependencies
  core_database:
    path: ../../core/core_database
  core_data:
    path: ../../core/core_data
  core_l10n:
    path: ../../core/core_l10n
  core_ui:
    path: ../../core/core_ui
  
  # Shared Packages
  shared_ui: 
    path: ../../shared/shared_ui
  shared_services:
    path: ../../shared/shared_services # Added to access ImagePickerService

  # Feature Dependencies
  feature_sync:
    path: ../feature_sync

dev_dependencies:
  supabase_flutter: ^2.5.4
  flutter_test:
    sdk: flutter